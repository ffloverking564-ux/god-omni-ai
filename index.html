<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOD-OMNI AI | ULTIMATE ENGINE</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
body{
    background:#050816;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}

.glass{
    background:rgba(17,24,39,0.75);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.08);
}

.locked{
    filter:grayscale(1) blur(3px);
    opacity:0.6;
}

.unlocked{
    border:1px solid #22c55e;
    box-shadow:0 0 20px rgba(34,197,94,0.4);
}

.feature-card{
    transition:0.3s;
    cursor:pointer;
}

.feature-card:hover{
    transform:translateY(-5px);
}

.terminal{
    background:#000;
    border:1px solid #222;
    font-family:monospace;
    color: white
}
</style>
</head>

<body class="p-6">

<header class="glass rounded-2xl p-6 flex justify-between items-center mb-8">

<div>
<h1 class="text-3xl font-black">
GOD-OMNI <span class="text-yellow-400">AI</span>
</h1>

<p class="color: white text-sm">
Ultimate Premium AI Engine
</p>
</div>
    <div class="mt-2">
    <a href="https://www.youtube.com/@FFLOVERKING33" target="_blank" 
       class="text-red-500 font-bold hover:underline flex items-center gap-2">
       <i class="fa-brands fa-youtube"></i> SUBSCRIBE TO MY YOUTUBE
    </a>
</div>


<div class="flex gap-3">

<button id="voiceBtn"
class="bg-white-500 text-black px-5 py-2 rounded-xl font-bold">
<i class="fa-solid fa-microphone"></i>
Voice
</button>

<button id="masterBtn"
class="bg-yellow-400 text-black px-5 py-2 rounded-xl font-bold">
<i class="fa-solid fa-key"></i>
Access
</button>

</div>

</header>

<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">

<div class="feature-card locked glass p-6 rounded-3xl">
<i class="fa-solid fa-code text-blue-400 text-3xl mb-3"></i>
<h3 class="font-bold text-xl">AI Coding</h3>
<p class="text-gray-400 text-sm mt-2">
Unlimited Coding System
</p>
</div>

<div class="feature-card locked glass p-6 rounded-3xl">
<i class="fa-solid fa-image text-pink-400 text-3xl mb-3"></i>
<h3 class="font-bold text-xl">AI Images</h3>
<p class="text-gray-400 text-sm mt-2">
AI Poster Generator
</p>
</div>

<div class="feature-card locked glass p-6 rounded-3xl">
<i class="fa-solid fa-video text- white text-3xl mb-3"></i>
<h3 class="font-bold text-xl">AI Video</h3>
<p class="text-gray-400 text-sm mt-2">
Cinematic Video Engine
</p>
</div>

<div class="feature-card locked glass p-6 rounded-3xl">
<i class="fa-solid fa-microphone text-orange-400 text-3xl mb-3"></i>
<h3 class="font-bold text-xl">Voice AI</h3>
<p class="text-gray-400 text-sm mt-2">
Speech Recognition Engine
</p>
</div>

</div>

<div id="terminal"
class="terminal rounded-3xl p-5 h-72 overflow-y-auto text-white- mb-5">

<div>> GOD-OMNI SYSTEM INITIALIZED...</div>

</div>

<input
id="chatInput"
class="w-full bg-gray-900 p-4 rounded-2xl border border-gray-700 outline-none"
placeholder="Ask GOD-OMNI AI..." />

<script>

// TERMINAL

const terminal =
document.getElementById('terminal');

function addLine(text){

terminal.innerHTML +=
`<div>> ${text}</div>`;

terminal.scrollTop =
terminal.scrollHeight;

}

// AI VOICE

function speak(text){

const speech =
new SpeechSynthesisUtterance(text);

speech.rate = 1;
speech.pitch = 1;

speechSynthesis.speak(speech);

}

// SUBSCRIPTION DATABASE

const subscriptionPlans = {

"VIP_999":{
level:"photo",
name:"VIP PHOTO PLAN"
},

"ULTRA_1999":{
level:"media",
name:"ULTRA MEDIA PLAN"
},

"KING_CODE_5999":{
level:"full",
name:"KING CODING PLAN"
}

};

// UNLOCK FEATURES

function unlockFeatures(level){

document.querySelectorAll('.feature-card')
.forEach(card=>{

const title =
card.querySelector('h3').innerText;

card.classList.add('locked');
card.classList.remove('unlocked');

if(level==="full"){

card.classList.remove('locked');
card.classList.add('unlocked');

}

else if(level==="media"){

if(
title==="AI Images"
||
title==="AI Video"
||
title==="Voice AI"
){

card.classList.remove('locked');
card.classList.add('unlocked');

}

}

else if(level==="photo"){

if(
title==="AI Images"
||
title==="Voice AI"
){

card.classList.remove('locked');
card.classList.add('unlocked');

}

}

});

localStorage.setItem(
'userPlan',
level
);

addLine(
"SUBSCRIPTION ACTIVATED: "
+ level.toUpperCase()
);

}

// VERIFY SUBSCRIPTION

function verifySubscription(key){

if(subscriptionPlans[key]){

const plan =
subscriptionPlans[key];

unlockFeatures(plan.level);

alert(
plan.name + " ACTIVATED"
);

speak(
plan.name + " activated"
);

addLine(
"ACTIVE PLAN: "
+ plan.name
);

}

else{

alert("INVALID KEY");

addLine("ACCESS DENIED");

speak("Invalid key");

}

}

// ACCESS BUTTON

document.getElementById('masterBtn')
.onclick = () => {

const key =
prompt(
"Enter Admin or Subscription Key"
);

if(key==="GOD_OMNI_MASTER"){

unlockFeatures("full");

alert("MASTER ACCESS");

speak("Welcome back admin");

addLine("ADMIN ACCESS ENABLED");

}

else{

verifySubscription(key);

}

};

// FEATURE CLICK

document.querySelectorAll('.feature-card')
.forEach(card=>{

card.onclick = () => {

if(card.classList.contains('locked')){

const key = prompt(

"👑 GOD-OMNI PREMIUM 👑\n\n"
+
"VIP PHOTO = VIP_999\n"
+
"ULTRA MEDIA = ULTRA_1999\n"
+
"KING CODING = KING_CODE_5999\n\n"
+
"UPI: loverking8919@oksbi\n\n"
+
"Enter Key:"

);

verifySubscription(key);

}

else{

const feature =
card.querySelector('h3').innerText;

addLine(feature + " READY");

speak(feature + " ready");

}

};

});

// CHAT SYSTEM

document.getElementById('chatInput')
.addEventListener('keypress',function(e){

if(e.key==='Enter'){

const msg = this.value;

addLine("USER: " + msg);

addLine("AI: Processing request...");

speak("Processing your request");

this.value='';

}

});

// VOICE INPUT

document.getElementById('voiceBtn')
.onclick = () => {

if('webkitSpeechRecognition' in window){

const recognition =
new webkitSpeechRecognition();

recognition.lang='en-US';

recognition.start();

addLine("VOICE LISTENING STARTED");

recognition.onresult =
function(event){

const text =
event.results[0][0].transcript;

document.getElementById(
'chatInput'
).value = text;

addLine("VOICE: " + text);

speak("You said " + text);

};

}

else{

alert(
"VOICE NOT SUPPORTED"
);

}

};

// SECURITY

window.addEventListener(
'contextmenu',
e=>e.preventDefault()
);

window.addEventListener(
'keydown',
e=>{

if(
e.key==='F12'
||
(
e.ctrlKey
&&
e.shiftKey
&&
e.key==='I'
)
){

e.preventDefault();

addLine(
"SECURITY WARNING"
);

}

});

// LOAD SYSTEM

window.onload = () => {

const savedPlan =
localStorage.getItem('userPlan');

if(savedPlan){

unlockFeatures(savedPlan);

}
// AI MIND CORE
function getAIResponse(input) {
    const msg = input.toLowerCase();
    
    if (msg.includes("hello") || msg.includes("hi")) {
        return "Hello! I am GOD-OMNI AI. How can I help you today?";
    } else if (msg.includes("who are you")) {
        return "I am GOD-OMNI AI, the ultimate premium intelligence engine.";
    } else if (msg.includes("time")) {
        return "The current time is " + new Date().toLocaleTimeString();
    } else {
        return "I am processing your command. I am currently evolving to serve you better.";
    }
}

// UPDATE CHAT SYSTEM TO USE MIND
document.getElementById('chatInput')
.addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        const msg = this.value;
        addLine("USER: " + msg);
        
        // AI Mind Logic Call
        const response = getAIResponse(msg);
        
        setTimeout(() => {
            addLine("AI: " + response);
            speak(response);
        }, 800);
        
        this.value = '';
    }
});

addLine("SYSTEM ONLINE");
addLine("VOICE ENGINE READY");
addLine("SECURITY CORE ACTIVE");

};

</script>

</body>
</html>
